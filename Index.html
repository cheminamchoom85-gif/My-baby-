<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday My Kuchupuchu ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow-x:hidden;
}

h1{
font-size:40px;
margin-top:40px;
}

.countdown{
font-size:30px;
margin:20px;
}

.gallery{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
}

.gallery img{
width:250px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

</style>
</head>

<body>

<h1>Happy Birthday My Kuchupuchu ❤️</h1>

<div class="countdown" id="countdown"></div>

<button onclick="playSong()">Play Our Song 🎵</button>

<audio id="music" autoplay loop>
<source src="madeinjapan.mp3" type="audio/mp3">
</audio>

<h2>Our Memories 📸</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<script>

/* COUNTDOWN */

var countDate = new Date("March 23, 2026 00:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();

var distance = countDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+"d "+hours+"h "+minutes+"m "+seconds+"s ";

},1000);


/* SONG */

function playSong(){
document.getElementById("music").play();
}


/* HEART ANIMATION */

setInterval(function(){

var heart = document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},300);

</script>

</body>
</html>
